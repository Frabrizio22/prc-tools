<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - PRC Peptides</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .icon {
            width: 80px;
            height: 80px;
            background: #FEF3C7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0A1628;
            margin-bottom: 12px;
        }
        p {
            font-size: 15px;
            color: #64748B;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: #2B7DE9;
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            margin-right: 8px;
        }
        .btn:hover {
            background: #1E5FBB;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #64748B;
        }
        .btn-secondary:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠</div>
        <h1>Payment Cancelled</h1>
        <p>You cancelled the payment process. Your order has not been placed and you have not been charged.</p>
        <p style="font-size:13px">Your cart items are still saved if you'd like to try again.</p>
        
        <a href="/checkout.html" class="btn">Return to Checkout</a>
        <a href="/shop.html" class="btn btn-secondary">Back to Shop</a>
    </div>
</body>
</html>
